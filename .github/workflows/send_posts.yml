name: Send New Posts to Telegram

on:
  schedule:
    # هر ۳ ساعت یکبار اجرا می‌شود (زمان UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch:  # این امکان را می‌دهد که به صورت دستی هم اجرا کنید

jobs:
  send-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cache for sent links
        uses: actions/cache@v4
        with:
          path: sent_links.json
          key: sent-links-v1

      - name: Run the bot
        run: python bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save cache for sent links
        uses: actions/cache@v4
        with:
          path: sent_links.json
          key: sent-links-v1
