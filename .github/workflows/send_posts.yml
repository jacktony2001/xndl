name: Send New Posts to Telegram

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  send-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome and ChromeDriver (matching versions)
        run: |
          # نصب وابستگی‌های مورد نیاز
          sudo apt-get update
          sudo apt-get install -y wget unzip xvfb libxss1 libappindicator3-1 libindicator7
          
          # دانلود و نصب نسخه خاص کروم (150.0.7871.128 که در سیستم هست)
          wget -q https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_150.0.7871.128-1_amd64.deb
          sudo dpkg -i google-chrome-stable_150.0.7871.128-1_amd64.deb || true
          sudo apt-get -f install -y
          
          # دانلود کروم‌درایور متناسب با نسخه کروم (150.0.7871.128)
          wget -q https://storage.googleapis.com/chrome-for-testing-public/150.0.7871.128/linux64/chromedriver-linux64.zip
          unzip -o chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
          sudo chmod +x /usr/bin/chromedriver
          
          # بررسی نسخه‌ها
          google-chrome --version
          chromedriver --version

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: sent_links.json
          key: sent-links-v1

      - name: Run bot
        run: python bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save cache
        uses: actions/cache@v4
        with:
          path: sent_links.json
          key: sent-links-v1
